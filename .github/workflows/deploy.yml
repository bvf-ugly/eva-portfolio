name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install music-metadata
        run: npm install music-metadata

      - name: Generate playlist.json
        run: node generate-playlist.mjs

      - name: Update embedded playlist in index.html
        run: |
          node -e "
          const fs = require('fs');
          const playlist = JSON.parse(fs.readFileSync('playlist.json', 'utf8'));
          const lines = playlist.map(t => {
            const obj = {};
            for (const [k, v] of Object.entries(t)) {
              if (k === 'year' || k === 'trackNumber') continue;
              obj[k] = v;
            }
            return '      ' + JSON.stringify(obj);
          });
          const block = lines.join(',\n');
          let html = fs.readFileSync('index.html', 'utf8');
          const re = /(window\.__EVA_PLAYLIST_DATA\s*=\s*\[)[\s\S]*?(\];)/;
          if (!re.test(html)) { console.error('Could not find __EVA_PLAYLIST_DATA in index.html'); process.exit(1); }
          html = html.replace(re, '$1\n' + block + '\n    $2');
          fs.writeFileSync('index.html', html);
          console.log('Updated embedded playlist with ' + playlist.length + ' tracks');
          "

      - name: Commit updated playlist and index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json index.html covers/
          git diff --staged --quiet || git commit -m "Update playlist [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
